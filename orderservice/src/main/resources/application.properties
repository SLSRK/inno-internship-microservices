spring.application.name=orderservice
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.profiles.active=local

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/orderservice}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

user.service.url=${USERSERVICE_URL:http://userservice:8080}

jwt.secret=${JWT_SECRET:auth-secret-key-for-json-web-token-service-123456}

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=order-group-v2
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=org.innowise.orderservice.dto
spring.kafka.consumer.properties.spring.json.value.default.type=org.innowise.orderservice.dto.PaymentStatusDTO
spring.kafka.consumer.properties.spring.json.use.type.headers=false

server.forward-headers-strategy=framework